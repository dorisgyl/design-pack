<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>design-pack</title>
<style>

  :root{
    --bg:#fff; --surface:#f7f8fa; --surface-2:#eef0f4; --text:#0b0d10; --text-muted:#5b6470;
    --border:#e3e6eb; --primary:#3b5bff; --primary-contrast:#fff;
    --space-1:4px; --space-2:8px; --space-3:12px; --space-4:16px; --space-6:24px;
    --space-8:32px; --space-12:48px;
    --radius-sm:6px; --radius-md:10px; --radius-lg:16px; --radius-full:9999px;
    --shadow-sm:0 1px 2px rgba(16,24,40,.06); --shadow-md:0 4px 12px rgba(16,24,40,.08);
    --font-sans:system-ui,-apple-system,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#0b0d10; --surface:#15181d; --surface-2:#1d2128; --text:#f2f4f7;
      --text-muted:#9aa4b2; --border:#2a2f37; --primary:#6f86ff; --primary-contrast:#0b0d10; }
  }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:var(--font-sans); background:var(--bg); color:var(--text); padding:var(--space-6); }
  header.top{ max-width:1180px; margin:0 auto var(--space-4); }
  .topbar{ display:flex; justify-content:space-between; align-items:center; gap:var(--space-4); }
  h1{ font-size:1.563rem; margin:0; }
  .lang{ flex:none; min-height:34px; padding:0 var(--space-4); border:1px solid var(--border);
    border-radius:var(--radius-full); background:var(--surface); color:var(--text); font:inherit;
    font-weight:600; cursor:pointer; }
  .lang:hover{ border-color:var(--primary); }
  .lang:focus-visible{ outline:2px solid var(--primary); outline-offset:2px; }
  .lead{ color:var(--text-muted); margin:var(--space-2) 0 var(--space-3); line-height:1.5; }
  .toolbar{ display:flex; gap:var(--space-3); align-items:center; }
  #filter{ flex:1; padding:var(--space-3); border:1px solid var(--border); border-radius:var(--radius-md);
    background:var(--surface); color:var(--text); font:inherit; }
  #filter:focus-visible{ outline:2px solid var(--primary); outline-offset:1px; }
  #viscount{ color:var(--text-muted); font-size:.8rem; white-space:nowrap; }
  .chips{ display:flex; flex-wrap:wrap; gap:var(--space-2); margin-top:var(--space-3); }
  .chip{ display:inline-flex; align-items:center; gap:6px; min-height:30px; padding:0 var(--space-3);
    border:1px solid var(--border); border-radius:var(--radius-full); background:var(--surface);
    color:var(--text); font:inherit; font-size:.85rem; cursor:pointer; }
  .chip:hover{ border-color:var(--primary); }
  .chip--on{ background:var(--primary); color:var(--primary-contrast); border-color:var(--primary); }
  .chip__n{ font-size:.72rem; opacity:.65; }
  .chip--on .chip__n{ opacity:.85; }
  .layout{ max-width:1180px; margin:0 auto; display:grid; grid-template-columns:208px 1fr;
    gap:var(--space-8); align-items:start; }
  .sidenav{ position:sticky; top:var(--space-3); align-self:start; max-height:calc(100dvh - var(--space-8));
    overflow:auto; display:flex; flex-direction:column; gap:1px; }
  .nav-head{ font-size:.7rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
    color:var(--text-muted); margin:var(--space-3) 0 var(--space-1); padding:0 var(--space-2); }
  .navlink{ display:flex; justify-content:space-between; align-items:center; gap:var(--space-2);
    padding:6px var(--space-2); border-radius:var(--radius-sm); color:var(--text-muted);
    text-decoration:none; font-size:.85rem; line-height:1.25; }
  .navlink:hover{ background:var(--surface); color:var(--text); }
  .navlink--sub{ padding-left:var(--space-4); }
  .navlink--active{ background:var(--surface-2); color:var(--text); font-weight:600; }
  .navlink__n{ flex:none; font-size:.72rem; color:var(--text-muted); }
  main{ min-width:0; }
  .group-sec{ scroll-margin-top:var(--space-3); }
  .group-sec:first-child .group{ margin-top:0; }
  .group{ margin:var(--space-6) 0 var(--space-4); font-size:.8rem; font-weight:600;
    letter-spacing:.04em; text-transform:uppercase; color:var(--text-muted); }
  .cards{ display:grid; gap:var(--space-4); grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); }
  .card{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg);
    padding:var(--space-4); display:flex; flex-direction:column; gap:var(--space-2);
    cursor:pointer; transition:border-color .15s, box-shadow .15s; }
  .card:has(input:checked){ border-color:var(--primary); box-shadow:var(--shadow-md); }
  .card__row{ display:flex; align-items:flex-start; gap:var(--space-3); }
  .card input{ margin-top:3px; width:18px; height:18px; accent-color:var(--primary); flex:none; }
  .card__title{ font-weight:600; line-height:1.3; }
  .card__title-zh{ color:var(--text-muted); font-size:.8rem; line-height:1.3; margin-top:1px; }
  .card__desc{ color:var(--text-muted); font-size:.875rem; line-height:1.5; margin:0;
    display:-webkit-box; -webkit-line-clamp:4; -webkit-box-orient:vertical; overflow:hidden; }
  .thumb{ width:100%; aspect-ratio:8/5; object-fit:cover; object-position:top; border-radius:var(--radius-md);
    border:1px solid var(--border); background:var(--surface-2); }
  .composer{ position:sticky; bottom:0; max-width:1180px; margin:var(--space-8) auto 0; background:var(--bg);
    border-top:1px solid var(--border); padding:var(--space-4) 0 var(--space-2); }
  .composer .meta{ display:flex; justify-content:space-between; align-items:center;
    color:var(--text-muted); font-size:.8rem; margin-bottom:var(--space-2); }
  textarea{ width:100%; min-height:84px; resize:vertical; padding:var(--space-3);
    border:1px solid var(--border); border-radius:var(--radius-md); background:var(--surface);
    color:var(--text); font:inherit; }
  textarea:focus-visible{ outline:2px solid var(--primary); outline-offset:1px; }
  .bar{ display:flex; gap:var(--space-3); align-items:center; margin-top:var(--space-3); }
  button#send{ min-height:44px; padding:0 var(--space-6); border:none; border-radius:var(--radius-md);
    background:var(--primary); color:var(--primary-contrast); font-weight:600; cursor:pointer; }
  button#send:disabled{ opacity:.55; cursor:default; }
  button#send:focus-visible{ outline:2px solid var(--text); outline-offset:2px; }
  #err{ color:#c0392b; font-size:.875rem; min-height:1.2em; }
  #status{ color:var(--text-muted); font-size:.875rem; }
  #status.warn{ color:#a66a00; }
  #stream{ white-space:pre-wrap; font-family:ui-monospace,Consolas,monospace; font-size:.8rem;
    color:var(--text-muted); max-height:180px; overflow:auto; margin-top:var(--space-2); }
  @media (max-width:820px){
    .layout{ grid-template-columns:1fr; }
    .sidenav{ display:none; }
  }
</style>
</head>
<body>
<header class="top">
  <div class="topbar">
    <h1 id="t-h1"></h1>
    <button id="lang-toggle" class="lang" type="button"></button>
  </div>
  <p class="lead" id="t-lead"></p>
  <div class="toolbar">
    <input id="filter" type="search" aria-label="filter"/>
    <span id="viscount"></span>
  </div>
  <div class="chips" id="chips"></div>
</header>
<div class="layout">
  <aside class="sidenav" id="sidenav" aria-label="sections"></aside>
  <main id="app"></main>
</div>

<div class="composer">
  <div class="meta"><span id="selcount"></span><span id="status"></span></div>
  <textarea id="prompt"></textarea>
  <div class="bar">
    <button id="send" type="button"></button>
    <span id="err"></span>
  </div>
  <pre id="stream"></pre>
</div>

<script>
  var CATALOG = [{"slug":"packs/design-pack/guides/accessibility/accessibility","type":"spec","category":"accessibility","collection":"","title_en":"Accessibility Coding Guidelines","title_zh":"无障碍编码指南","desc_en":"This guide provides actionable DOs and DON'Ts for AI coding agents to ensure web applications are accessible to all users, including those using assistive technologies.","desc_zh":"本指南为 AI 编码 agent 提供可操作的应做与不应做事项，确保 Web 应用对所有用户（包括使用辅助技术的用户）都具备无障碍访问能力。"},{"slug":"packs/design-pack/guides/accessibility/accessible-error-announcement","type":"spec","category":"accessibility","collection":"","title_en":"Accessible Error Announcement","title_zh":"无障碍错误通报","desc_en":"Standard HTML5 validation provides visual feedback (via :invalid or :user-invalid), but it doesn't automatically synchronize with accessibility attributes like aria-invalid.","desc_zh":"标准 HTML5 验证提供视觉反馈（通过 :invalid 或 :user-invalid），但它不会自动与 aria-invalid 等无障碍属性同步。"},{"slug":"packs/design-pack/guides/built-in-ai/language-detection","type":"spec","category":"built-in-ai","collection":"","title_en":"language detection","title_zh":"语言检测","desc_en":"The Language Detector API is a client-side web API designed to identify the language of a given text string.","desc_zh":"Language Detector API 是一个客户端 Web API，用于识别给定文本字符串的语言。"},{"slug":"packs/design-pack/guides/built-in-ai/language-model","type":"spec","category":"built-in-ai","collection":"","title_en":"language model","title_zh":"语言模型","desc_en":"The Prompt API allows developers to run natural language processing tasks directly in the browser using Gemini Nano.","desc_zh":"Prompt API 允许开发者使用 Gemini Nano 直接在浏览器中运行自然语言处理任务。"},{"slug":"packs/design-pack/guides/built-in-ai/summarizer","type":"spec","category":"built-in-ai","collection":"","title_en":"summarizer","title_zh":"摘要生成器","desc_en":"The Summarizer API allows web developers to offer local, AI-powered text distillation directly within the browser using Gemini Nano in Chrome or Phi in Edge.","desc_zh":"Summarizer API 允许 Web 开发者在浏览器中直接提供本地的、由 AI 驱动的文本提炼功能，在 Chrome 中使用 Gemini Nano，在 Edge 中使用 Phi。"},{"slug":"packs/design-pack/guides/built-in-ai/translator","type":"spec","category":"built-in-ai","collection":"","title_en":"translator","title_zh":"翻译器","desc_en":"The Translator API allows developers to perform client-side text translation using built-in AI models in Chrome and Edge.","desc_zh":"Translator API 允许开发者在 Chrome 和 Edge 中使用内置 AI 模型执行客户端文本翻译。"},{"slug":"packs/design-pack/guides/css-layout/css-layout","type":"spec","category":"css-layout","collection":"","title_en":"CSS Layouts and Responsive Design","title_zh":"CSS 布局与响应式设计","desc_en":"Lean on the browser's layout engine when possible for better performance.","desc_zh":"尽可能借助浏览器的布局引擎以获得更好的性能。"},{"slug":"packs/design-pack/guides/css/css","type":"spec","category":"css","collection":"","title_en":"CSS: Modern Architecture and Performance","title_zh":"CSS：现代架构与性能","desc_en":"These guidelines provide a high-density reference for writing maintainable, performant, and standard-compliant CSS.","desc_zh":"这些准则为编写可维护、高性能且符合标准的 CSS 提供了高密度的参考。"},{"slug":"packs/design-pack/guides/css/highlight-text-ranges","type":"spec","category":"css","collection":"","title_en":"highlight text ranges","title_zh":"高亮文本范围","desc_en":"The CSS Custom Highlight API lets you style arbitrary text ranges on a page without modifying the DOM structure.","desc_zh":"CSS Custom Highlight API 让你无需修改 DOM 结构即可为页面上任意文本范围设置样式。"},{"slug":"packs/design-pack/guides/forms/animated-select-picker","type":"spec","category":"forms","collection":"","title_en":"Animated Select Picker","title_zh":"动画化的下拉选择器","desc_en":"The customizable select API offers a declarative, CSS-driven way to animate <select> elements and their dropdown pickers.","desc_zh":"可定制的 select API 提供了一种声明式、由 CSS 驱动的方式，用于为 <select> 元素及其下拉选择器添加动画。"},{"slug":"packs/design-pack/guides/forms/autofill-address-form","type":"spec","category":"forms","collection":"","title_en":"Build an address form that follows best practice","title_zh":"构建遵循最佳实践的地址表单","desc_en":"Create a form that makes it as easy as possible for users to enter address data on desktop and mobile.","desc_zh":"创建一个表单，让用户在桌面端和移动端都能尽可能轻松地输入地址数据。"},{"slug":"packs/design-pack/guides/forms/autofill-highlight-inputs","type":"spec","category":"forms","collection":"","title_en":"Use the CSS :autofill pseudo-class to highlight form fields that have been autofilled by the browser and not edited by the user","title_zh":"使用 CSS :autofill 伪类高亮显示由浏览器自动填充且未被用户编辑的表单字段","desc_en":"Use the CSS :autofill to highlight fields that have (or have not been) autofilled, to help guide the user to successful form completion.","desc_zh":"使用 CSS :autofill 高亮显示已（或尚未）自动填充的字段，帮助引导用户顺利完成表单填写。"},{"slug":"packs/design-pack/guides/forms/autofill-payment-form","type":"spec","category":"forms","collection":"","title_en":"Build a payment form that follows best practice","title_zh":"构建遵循最佳实践的支付表单","desc_en":"Payment forms are the single most critical part of the checkout process.","desc_zh":"支付表单是结账流程中最为关键的环节。"},{"slug":"packs/design-pack/guides/forms/autofill-sign-in-form","type":"spec","category":"forms","collection":"","title_en":"Build a sign-in form that follows best practice","title_zh":"构建遵循最佳实践的登录表单","desc_en":"Use cross-platform browser features to build sign-in forms that are secure, accessible and easy to use.","desc_zh":"利用跨平台的浏览器功能，构建安全、无障碍且易于使用的登录表单。"},{"slug":"packs/design-pack/guides/forms/autofill-sign-up-form","type":"spec","category":"forms","collection":"","title_en":"Build a sign-up form that follows best practice","title_zh":"构建遵循最佳实践的注册表单","desc_en":"Use cross-platform browser features to build sign-up forms that are secure, accessible and easy to use.","desc_zh":"利用跨平台的浏览器功能，构建安全、无障碍且易于使用的注册表单。"},{"slug":"packs/design-pack/guides/forms/brand-consistent-forms","type":"spec","category":"forms","collection":"","title_en":"Brand-Consistent Forms","title_zh":"品牌一致的表单","desc_en":"Customizing standard HTML form elements like checkboxes and radio buttons has historically been difficult.","desc_zh":"长期以来，自定义复选框和单选按钮等标准 HTML 表单元素一直是个难题。"},{"slug":"packs/design-pack/guides/forms/branded-select-styling","type":"spec","category":"forms","collection":"","title_en":"Branded Select Styling","title_zh":"品牌化的 Select 样式","desc_en":"The customizable select API offers a declarative, CSS-driven way to style <select> elements to perfectly match your brand's design system.","desc_zh":"可定制的 select API 提供了一种声明式、由 CSS 驱动的方式来设置 <select> 元素的样式，使其完美契合你的品牌设计系统。"},{"slug":"packs/design-pack/guides/forms/custom-select-picker-layouts","type":"spec","category":"forms","collection":"","title_en":"Custom Select Picker Layouts","title_zh":"自定义 Select 选择器布局","desc_en":"'Custom Select Picker Layouts' allow developers to break away from the traditional vertical list of options in a <select> dropdown.","desc_zh":"'自定义 Select 选择器布局'让开发者得以摆脱 <select> 下拉框中传统的垂直选项列表。"},{"slug":"packs/design-pack/guides/forms/form-fields-automatically-fit-contents","type":"spec","category":"forms","collection":"","title_en":"form fields automatically fit contents","title_zh":"表单字段自动适应内容","desc_en":"By default, form controls like <input>, <textarea>, and <select> have fixed dimensions.","desc_zh":"默认情况下，<input>、<textarea> 和 <select> 等表单控件具有固定的尺寸。"},{"slug":"packs/design-pack/guides/forms/forms","type":"spec","category":"forms","collection":"","title_en":"forms","title_zh":"表单","desc_en":"Single-Sentence Mental Model: 'Expose mutually exclusive options as visible radio buttons when choices are fewer than six; use <select> only when space is constrained or the list…","desc_zh":"一句话心智模型：'当选项少于六个时，将互斥选项以可见的单选按钮形式呈现；仅当空间受限或列表较长时才使用 <select>…'"},{"slug":"packs/design-pack/guides/forms/required-field-feedback","type":"spec","category":"forms","collection":"","title_en":"Required Field Feedback","title_zh":"必填字段反馈","desc_en":"Marking required fields with an error state immediately upon page load can be confusing.","desc_zh":"在页面加载时立即将必填字段标记为错误状态可能会让用户感到困惑。"},{"slug":"packs/design-pack/guides/forms/rich-media-picker","type":"spec","category":"forms","collection":"","title_en":"Rich Media Picker (Customizable Select)","title_zh":"富媒体选择器（可定制的 Select）","desc_en":"The native <select> element was historically difficult to style and could only contain plain text options.","desc_zh":"原生 <select> 元素历来难以设置样式，且只能包含纯文本选项。"},{"slug":"packs/design-pack/guides/forms/select-menu-interaction","type":"spec","category":"forms","collection":"","title_en":"Select Menu Interaction","title_zh":"选择菜单交互","desc_en":"For mandatory dropdowns (e.g., 'Choose a Country'), standard validation flags the field as invalid immediately if the default option has an empty value.","desc_zh":"对于必填下拉菜单（例如'选择国家/地区'），如果默认选项的值为空，标准验证会立即将该字段标记为无效。"},{"slug":"packs/design-pack/guides/forms/validate-input-after-interaction","type":"spec","category":"forms","collection":"","title_en":"Validate Input After Interaction","title_zh":"在用户交互后再验证输入","desc_en":"Displaying validation errors the moment a user focuses on a field and starts typing is premature and distracting.","desc_zh":"在用户聚焦字段并开始输入的那一刻就显示验证错误为时过早，且会分散注意力。"},{"slug":"packs/design-pack/guides/html/html","type":"spec","category":"html","collection":"","title_en":"html","title_zh":"html","desc_en":"Definition of the &lt;figure&gt; element from the <cite>HTML Living Standard</cite>","desc_zh":"来自 <cite>HTML Living Standard</cite> 的 &lt;figure&gt; 元素定义"},{"slug":"packs/design-pack/guides/passkeys/passkey-authentication","type":"spec","category":"passkeys","collection":"","title_en":"Passkey Authentication Guide","title_zh":"Passkey 身份验证指南","desc_en":"This guide details how to implement returning user authentication using discoverable credentials, both through explicit button triggers and seamless browser autofill suggestions…","desc_zh":"本指南详细介绍如何使用 discoverable credentials 实现回访用户身份验证，既可通过显式按钮触发，也可通过无缝的浏览器 autofill 建议（Conditional UI）实现…"},{"slug":"packs/design-pack/guides/passkeys/passkey-conditional-create","type":"spec","category":"passkeys","collection":"","title_en":"Passkey Conditional Create (Post-Login Promotion)","title_zh":"Passkey Conditional Create（登录后推广）","desc_en":"This guide details how to automatically and silently register a passkey for a user immediately after a successful password-based sign-in, minimizing friction and boosting passkey…","desc_zh":"本指南详细介绍如何在用户成功完成基于密码的登录后，立即自动且静默地为其注册 passkey，从而最大限度减少摩擦并提升 passkey 采用率…"},{"slug":"packs/design-pack/guides/passkeys/passkey-management","type":"spec","category":"passkeys","collection":"","title_en":"Passkey Management Guide","title_zh":"Passkey 管理指南","desc_en":"This guide details how to enable users to view, rename, and delete their registered passkeys while keeping saved credentials perfectly synchronized between the server and the…","desc_zh":"本指南详细介绍如何让用户查看、重命名和删除已注册的 passkey，同时使用 Signal API 在服务器与用户的密码管理器之间保持已保存凭据完全同步…"},{"slug":"packs/design-pack/guides/passkeys/passkey-reauthentication","type":"spec","category":"passkeys","collection":"","title_en":"Passkey Reauthentication Guide","title_zh":"Passkey 重新身份验证指南","desc_en":"This delta-focused guide details how to implement step-up authentication or re-verification for a signed-in user before they perform sensitive account changes (e.g.","desc_zh":"这份聚焦增量的指南详细介绍如何在已登录用户执行敏感账户更改（例如更新密码、资金转账）之前，为其实现 step-up 身份验证或重新验证。"},{"slug":"packs/design-pack/guides/passkeys/passkey-registration","type":"spec","category":"passkeys","collection":"","title_en":"Passkey Registration Guide","title_zh":"Passkey 注册指南","desc_en":"This guide details how to enable users to register a passkey for their account, providing a highly secure, phishing-resistant passwordless sign-in alternative.","desc_zh":"本指南详细介绍如何让用户为其账户注册 passkey，从而提供一种高度安全、抗钓鱼的无密码登录替代方案。"},{"slug":"packs/design-pack/guides/passkeys/passkeys","type":"spec","category":"passkeys","collection":"","title_en":"Passkeys Orientation Guide","title_zh":"Passkeys 入门指南","desc_en":"This guide provides high-density, action-oriented orientation for implementing secure, framework-agnostic passkey authentication and credential management in modern web…","desc_zh":"本指南提供高密度、面向操作的入门指引，帮助你在现代 Web 应用中实现安全、框架无关的 passkey 身份验证与凭据管理…"},{"slug":"packs/design-pack/guides/performance/batch-analytics-events","type":"spec","category":"performance","collection":"","title_en":"Debounce and batch multiple analytics events","title_zh":"对多个 analytics 事件进行防抖与批处理","desc_en":"Most analytics and telemetry data is low priority and you can safely defer sending it until the user leaves the page.","desc_zh":"大多数 analytics 与遥测数据优先级较低，你可以安全地将其延迟发送，直到用户离开页面。"},{"slug":"packs/design-pack/guides/performance/break-up-long-tasks","type":"spec","category":"performance","collection":"","title_en":"break up long tasks","title_zh":"拆分长任务","desc_en":"Heavy computations or long loops can block the main thread, causing the page to become unresponsive.","desc_zh":"繁重的计算或长循环会阻塞主线程，导致页面失去响应。"},{"slug":"packs/design-pack/guides/performance/calculate-total-foreground-time","type":"spec","category":"performance","collection":"","title_en":"Calculate total foreground time","title_zh":"计算总前台时间","desc_en":"This guide details how to accurately calculate the total time a user spends actively viewing a page.","desc_zh":"本指南详细介绍如何准确计算用户主动浏览页面的总时长。"},{"slug":"packs/design-pack/guides/performance/conditional-async-dependencies","type":"spec","category":"performance","collection":"","title_en":"conditional async dependencies","title_zh":"条件式异步依赖","desc_en":"Top-level await allows modules to act as asynchronous functions, meaning they can pause module execution to await promises.","desc_zh":"Top-level await 让模块可以像异步函数一样运行，即它们可以暂停模块执行以 await promise。"},{"slug":"packs/design-pack/guides/performance/defer-rendering-heavy-content","type":"spec","category":"performance","collection":"","title_en":"Defer rendering heavy content","title_zh":"延迟渲染繁重内容","desc_en":"Web pages with extensive content—such as infinite scrolls, complex dashboards, or dense articles can suffer from slow initial rendering and sluggish interactions.","desc_zh":"内容繁多的网页——例如无限滚动、复杂仪表盘或密集文章——可能存在初始渲染缓慢和交互卡顿的问题。"},{"slug":"packs/design-pack/guides/performance/defer-work-until-scroll-ends","type":"spec","category":"performance","collection":"","title_en":"Defer Work Until Scroll Ends","title_zh":"延迟工作直到滚动结束","desc_en":"Scrolling on the web should be smooth and responsive.","desc_zh":"Web 上的滚动应当流畅且响应迅速。"},{"slug":"packs/design-pack/guides/performance/deprioritize-background-fetches","type":"spec","category":"performance","collection":"","title_en":"Deprioritize background fetches","title_zh":"降低后台 fetch 的优先级","desc_en":"When a page performs multiple simultaneous network requests, they often compete for the same bandwidth.","desc_zh":"当页面同时发起多个网络请求时，它们往往会争夺同一带宽。"},{"slug":"packs/design-pack/guides/performance/detect-initial-visibility-state","type":"spec","category":"performance","collection":"","title_en":"detect initial visibility state","title_zh":"检测初始可见性状态","desc_en":"Determining if a page was initially loaded in the background (e.g., opened in a new background tab) is critical for accurate performance monitoring.","desc_zh":"判断页面最初是否在后台加载（例如在新的后台标签页中打开）对于准确的性能监控至关重要。"},{"slug":"packs/design-pack/guides/performance/efficient-background-processing","type":"spec","category":"performance","collection":"","title_en":"Efficient Background Processing","title_zh":"高效的后台处理","desc_en":"Pause heavy background tasks when a component is not being rendered by the browser to conserve system resources and battery life.","desc_zh":"当组件未被浏览器渲染时暂停繁重的后台任务，以节省系统资源和电池续航。"},{"slug":"packs/design-pack/guides/performance/faster-spa-view-transitions","type":"spec","category":"performance","collection":"","title_en":"Faster SPA View Transitions via State Caching","title_zh":"通过状态缓存加速 SPA 视图切换","desc_en":"Enable instant navigation between views in a Single-Page Application (SPA) by caching the rendered state of inactive views instead of destroying them.","desc_zh":"通过缓存非活动视图的渲染状态而非销毁它们，在 Single-Page Application (SPA) 中实现视图间的即时导航。"},{"slug":"packs/design-pack/guides/performance/full-session-analytics","type":"spec","category":"performance","collection":"","title_en":"Reliably measure full-session analytics and telemetry","title_zh":"可靠地测量整个会话的分析与遥测数据","desc_en":"To reliably analytics and telemetry data that covers the entirety of a user's visit to a web page (not just until page load) use the fetchLater() API.","desc_zh":"若要可靠地采集覆盖用户访问网页全程（而不仅是到页面加载为止）的分析与遥测数据，请使用 fetchLater() API。"},{"slug":"packs/design-pack/guides/performance/identify-heavy-scripts","type":"spec","category":"performance","collection":"","title_en":"Identify heavy-running JavaScript","title_zh":"识别高耗时的 JavaScript","desc_en":"Heavy-running JavaScript can have a detrimental effect on both page load performance and interactivity.","desc_zh":"高耗时运行的 JavaScript 会对页面加载性能和交互性产生不利影响。"},{"slug":"packs/design-pack/guides/performance/identify-inp-causes","type":"spec","category":"performance","collection":"","title_en":"Identify causes of poor INP","title_zh":"识别 INP 不佳的原因","desc_en":"Poor responsiveness to interactions leads to a poor impression of a page being slow or even completely broken.","desc_zh":"交互响应迟缓会让用户觉得页面卡顿，甚至完全无法使用。"},{"slug":"packs/design-pack/guides/performance/improve-next-page-load-performance","type":"spec","category":"performance","collection":"","title_en":"Improve next page load performance","title_zh":"提升下一个页面的加载性能","desc_en":"One of the most effective ways to improve page load performance for users navigating a site is to initiate loading the next page they're about to visit before they visit it.","desc_zh":"为浏览站点的用户提升页面加载性能最有效的方法之一，就是在用户访问下一个页面之前提前开始加载它。"},{"slug":"packs/design-pack/guides/performance/interactions-in-complex-layouts","type":"spec","category":"performance","collection":"","title_en":"Optimizing Interactions in Complex Layouts","title_zh":"优化复杂布局中的交互","desc_en":"Maintain high frame rates (60FPS) and eliminate interaction latency during drag-and-drop or heavy mutations in complex, multi-column layouts like Kanban boards or massive data…","desc_zh":"在 Kanban 看板或大型数据网格等复杂的多列布局中，于拖放或大量变更操作期间保持高帧率（60FPS）并消除交互延迟。"},{"slug":"packs/design-pack/guides/performance/optimize-image-priority","type":"spec","category":"performance","collection":"","title_en":"Optimize image priority","title_zh":"优化图片加载优先级","desc_en":"Browsers use heuristics to assign loading priorities to images, but these defaults may not always align with your page's Largest Contentful Paint (LCP).","desc_zh":"浏览器通过启发式规则为图片分配加载优先级，但这些默认值未必总能与页面的 Largest Contentful Paint (LCP) 相匹配。"},{"slug":"packs/design-pack/guides/performance/optimize-preload-priority","type":"spec","category":"performance","collection":"","title_en":"Optimize preload priority","title_zh":"优化 preload 优先级","desc_en":"Preloading resources with <link rel='preload'> signals to the browser that a resource will be needed soon.","desc_zh":"使用 <link rel='preload'> 预加载资源会向浏览器表明某资源很快将被用到。"},{"slug":"packs/design-pack/guides/performance/optimize-script-priority","type":"spec","category":"performance","collection":"","title_en":"Optimize script priority","title_zh":"优化脚本加载优先级","desc_en":"Browsers assign default priorities to scripts based on where they appear in the document and whether they have attributes like async or defer.","desc_zh":"浏览器会根据脚本在文档中出现的位置以及是否带有 async 或 defer 等属性，为其分配默认优先级。"},{"slug":"packs/design-pack/guides/performance/performance","type":"spec","category":"performance","collection":"","title_en":"performance","title_zh":"性能","desc_en":"The Critical Rendering Path dictates how quickly the browser converts HTML, CSS, and JavaScript into painted pixels.","desc_zh":"Critical Rendering Path 决定了浏览器将 HTML、CSS 和 JavaScript 转换为绘制像素的速度。"},{"slug":"packs/design-pack/guides/performance/resolution-optimized-pseudo-elements","type":"spec","category":"performance","collection":"","title_en":"resolution optimized pseudo elements","title_zh":"分辨率优化的伪元素","desc_en":"Using resolution-optimized images in CSS pseudo-elements (like ::before or ::after) allows you to add decorative icons or structural graphics without cluttering your HTML with…","desc_zh":"在 CSS 伪元素（如 ::before 或 ::after）中使用分辨率优化的图像，让你无需向 HTML 添加多余的 DOM 节点即可加入装饰图标或结构性图形…"},{"slug":"packs/design-pack/guides/performance/schedule-tasks-by-priority","type":"spec","category":"performance","collection":"","title_en":"schedule tasks by priority","title_zh":"按优先级调度任务","desc_en":"When building complex web applications, tasks have different levels of urgency.","desc_zh":"在构建复杂的 Web 应用时，任务具有不同的紧急程度。"},{"slug":"packs/design-pack/guides/performance/sequence-distributed-events","type":"spec","category":"performance","collection":"","title_en":"Sequencing Distributed Events","title_zh":"为分布式事件排序","desc_en":"High-frequency tracing and event logging in distributed systems require precise timestamps to ensure correct causal ordering.","desc_zh":"分布式系统中的高频追踪和事件日志需要精确的时间戳，以确保正确的因果顺序。"},{"slug":"packs/design-pack/guides/privacy/privacy","type":"spec","category":"privacy","collection":"","title_en":"Web Privacy Guidelines for Developers","title_zh":"面向开发者的 Web 隐私指南","desc_en":"Web application developers must treat privacy as a foundational architectural requirement, not just a legal compliance checkbox.","desc_zh":"Web 应用开发者必须将隐私视为一项基础性的架构需求，而不仅仅是一个法律合规的勾选项。"},{"slug":"packs/design-pack/guides/security/security","type":"spec","category":"security","collection":"","title_en":"Web Security","title_zh":"Web 安全","desc_en":"Guidelines for implementing preventative security measures on the web safely and incrementally.","desc_zh":"关于如何在 Web 上安全、渐进地实施预防性安全措施的指南。"},{"slug":"packs/design-pack/guides/user-experience/adapt-scrollbar-to-contrast-preferences","type":"spec","category":"user-experience","collection":"","title_en":"Adapt scrollbar to high-contrast preferences","title_zh":"使滚动条适配高对比度偏好","desc_en":"Users who enable high-contrast modes in their operating system or browser expect UI elements (like scrollbars) to be extremely legible, often relying on stark…","desc_zh":"在操作系统或浏览器中启用高对比度模式的用户，期望 UI 元素（如滚动条）极为清晰可辨，通常依赖鲜明的前景与背景区分…"},{"slug":"packs/design-pack/guides/user-experience/anchor-positioning-tab-underline","type":"spec","category":"user-experience","collection":"","title_en":"anchor positioning tab underline","title_zh":"使用 anchor positioning 实现标签页下划线","desc_en":"In a tab menu, you should provide visual hints to users about what page they are on.","desc_zh":"在标签页菜单中，你应当为用户提供视觉提示，告知其当前所在的页面。"},{"slug":"packs/design-pack/guides/user-experience/animate-element-entry-exit","type":"spec","category":"user-experience","collection":"","title_en":"animate element entry exit","title_zh":"为元素的进入与退出添加动画","desc_en":"In the past, CSS transitions could not animate elements when they were first added to the DOM or when their display property changed from none.","desc_zh":"过去，当元素首次被添加到 DOM 中，或其 display 属性从 none 变化时，CSS transitions 无法为其添加动画。"},{"slug":"packs/design-pack/guides/user-experience/animate-to-from-top-layer","type":"spec","category":"user-experience","collection":"","title_en":"animate to from top layer","title_zh":"为进出 top layer 的元素添加动画","desc_en":"Elements that render in the 'top layer' (like <dialog>, elements with the popover attribute, or tooltips) have historically been difficult to animate because they toggle between…","desc_zh":"渲染在 'top layer' 中的元素（如 <dialog>、带 popover 属性的元素或 tooltips）一直以来都难以添加动画，因为它们会在显示与隐藏状态之间切换…"},{"slug":"packs/design-pack/guides/user-experience/animate-to-intrinsic-sizes","type":"spec","category":"user-experience","collection":"","title_en":"Animate to Intrinsic Sizes","title_zh":"为元素添加到固有尺寸的动画","desc_en":"Animating elements to dynamic sizes like block-size: auto or inline-size: max-content has historically required JavaScript or fragile 'max-height' hacks.","desc_zh":"将元素动画过渡到 block-size: auto 或 inline-size: max-content 等动态尺寸，过去往往需要 JavaScript 或脆弱的 'max-height' 技巧。"},{"slug":"packs/design-pack/guides/user-experience/apply-webgl-shaders","type":"spec","category":"user-experience","collection":"","title_en":"Apply WebGL shaders to HTML content","title_zh":"将 WebGL 着色器应用于 HTML 内容","desc_en":"WebGL shaders provide powerful GPU-accelerated visual effects, enabling advanced capabilities like dynamic ripple distortions, lighting models, color grading, and custom vertex…","desc_zh":"WebGL 着色器提供强大的 GPU 加速视觉效果，可实现动态波纹扭曲、光照模型、调色以及自定义顶点变换等高级功能。HTML-in-Canvas API 允许开发者将 WebGL 纹理应用于 HTML 内容，从而可以将高性能的片元着色器和顶点着色器原生应用于完全可交互的 UI 组件，如按钮、输入框和富文本，同时保留原生的可访问性、文本选择和 DOM 事件处理…"},{"slug":"packs/design-pack/guides/user-experience/calculate-event-differentials","type":"spec","category":"user-experience","collection":"","title_en":"Calculating Event Differentials with Temporal","title_zh":"使用 Temporal 计算事件时间差","desc_en":"Calculating the time elapsed between events (such as trial expirations, subscription durations, or prorated costs) has historically been difficult with the legacy Date object due…","desc_zh":"计算事件之间经过的时间（例如试用到期、订阅时长或按比例计费）一直以来都很困难，因为传统的 Date 对象在时区、夏令时（DST）和解析不一致等方面存在诸多复杂性……"},{"slug":"packs/design-pack/guides/user-experience/calculate-with-intrinsic-sizes","type":"spec","category":"user-experience","collection":"","title_en":"calculate with intrinsic sizes","title_zh":"使用固有尺寸进行计算","desc_en":"calc-size() is a CSS function for performing mathematical operations on intrinsic sizing keywords like auto, min-content, and fit-content.","desc_zh":"calc-size() 是一个 CSS 函数，用于对 auto、min-content 和 fit-content 等固有尺寸关键字执行数学运算。"},{"slug":"packs/design-pack/guides/user-experience/capture-location-agnostic-data","type":"spec","category":"user-experience","collection":"","title_en":"Capturing Location-Agnostic Data with Temporal","title_zh":"使用 Temporal 捕获与地理位置无关的数据","desc_en":"Recording chronological data that should remain identical regardless of the viewer's location (such as birthdates, recurring alarms, or national holidays) has historically been…","desc_zh":"记录无论查看者身处何地都应保持一致的时间数据（例如出生日期、重复闹钟或法定节假日），一直以来都很容易出错……"},{"slug":"packs/design-pack/guides/user-experience/carousel-slide-effects","type":"spec","category":"user-experience","collection":"","title_en":"Build Carousel Slide Effects","title_zh":"构建轮播滑动效果","desc_en":"Carousel slide effects are a great way to add visual interest to a carousel.","desc_zh":"轮播滑动效果是为轮播组件增添视觉吸引力的绝佳方式。"},{"slug":"packs/design-pack/guides/user-experience/carousel-snap-highlights","type":"spec","category":"user-experience","collection":"","title_en":"carousel snap highlights","title_zh":"轮播吸附高亮","desc_en":"Scroll-state container queries allow you to style elements based on their current scroll state, such as whether an element is 'stuck' (via sticky positioning) or 'snapped' (via…","desc_zh":"scroll-state 容器查询允许你根据元素当前的滚动状态来设置样式，例如某个元素是否处于“吸顶”（通过 sticky 定位）或“吸附”（通过滚动吸附）状态……"},{"slug":"packs/design-pack/guides/user-experience/child-state-based-styling","type":"spec","category":"user-experience","collection":"","title_en":"child state based styling","title_zh":"基于子元素状态的样式设置","desc_en":"Historically, CSS selectors could only traverse downwards—you could style a child based on its parent, but not a parent based on its child.","desc_zh":"过去，CSS 选择器只能向下遍历——你可以根据父元素来设置子元素的样式，却无法根据子元素来设置父元素的样式。"},{"slug":"packs/design-pack/guides/user-experience/complex-shapes","type":"spec","category":"user-experience","collection":"","title_en":"complex shapes","title_zh":"复杂形状","desc_en":"To clip elements to complex, free-form shapes like brush strokes or organic textures, use CSS Masking (mask-image).","desc_zh":"要将元素裁剪为笔触或有机纹理等复杂的自由形状，请使用 CSS 遮罩（mask-image）。"},{"slug":"packs/design-pack/guides/user-experience/component-specific-light-dark-theme","type":"spec","category":"user-experience","collection":"","title_en":"Component-specific light/dark themes","title_zh":"组件级别的明暗主题","desc_en":"While more commonly set on the root, the color-scheme property can be set on individual elements to force them into a different color scheme from the rest of the page.","desc_zh":"虽然 color-scheme 属性更常设置在根元素上，但它也可以设置在单个元素上，强制这些元素采用与页面其余部分不同的配色方案。"},{"slug":"packs/design-pack/guides/user-experience/consistent-cross-document-transitions","type":"spec","category":"user-experience","collection":"","title_en":"Consistent Cross-Document Transitions","title_zh":"一致的跨文档过渡","desc_en":"Cross-document view transitions animate elements between two pages during a same-origin navigation.","desc_zh":"跨文档 View Transitions 在同源导航过程中，为两个页面之间的元素添加动画过渡效果。"},{"slug":"packs/design-pack/guides/user-experience/content-based-styling","type":"spec","category":"user-experience","collection":"","title_en":"content based styling","title_zh":"基于内容的样式设置","desc_en":"Historically, applying different layouts to a component based on its content required either JavaScript or conditional logic in your HTML templating language to inject modifier…","desc_zh":"过去，要根据组件的内容为其应用不同的布局，需要借助 JavaScript，或在 HTML 模板语言中编写条件逻辑来注入修饰符……"},{"slug":"packs/design-pack/guides/user-experience/coordinate-global-events","type":"spec","category":"user-experience","collection":"","title_en":"Coordinating Global Events with Temporal","title_zh":"使用 Temporal 协调全球事件","desc_en":"Scheduling events across different time zones is notoriously difficult with the legacy Date object, especially around Daylight Saving Time (DST) transitions when hours can be…","desc_zh":"使用传统的 Date 对象在不同时区之间安排事件非常困难，尤其是在夏令时（DST）切换期间，此时可能会跳过或重复某些小时…"},{"slug":"packs/design-pack/guides/user-experience/cross-document-transitions","type":"spec","category":"user-experience","collection":"","title_en":"cross document transitions","title_zh":"跨文档过渡","desc_en":"Cross-document view transitions allow you to create smooth, app-like transitions between different pages of a Multi-Page Application (MPA).","desc_zh":"跨文档 View Transitions 让你能在多页应用（MPA）的不同页面之间创建流畅的、类原生应用般的过渡效果。"},{"slug":"packs/design-pack/guides/user-experience/customize-scrollbar-color-and-thickness","type":"spec","category":"user-experience","collection":"","title_en":"Customize the color or thickness of a scrollbar","title_zh":"自定义滚动条的颜色或粗细","desc_en":"You can customize the appearance of scrollbars using the standard CSS properties scrollbar-color and scrollbar-width.","desc_zh":"你可以使用标准的 CSS 属性 scrollbar-color 和 scrollbar-width 来自定义滚动条的外观。"},{"slug":"packs/design-pack/guides/user-experience/dark-mode","type":"spec","category":"user-experience","collection":"","title_en":"Dark mode","title_zh":"深色模式","desc_en":"The color-scheme property indicates which color schemes (such as light or dark) your page supports.","desc_zh":"color-scheme 属性用于声明你的页面支持哪些配色方案（例如浅色或深色）。"},{"slug":"packs/design-pack/guides/user-experience/declarative-button-actions","type":"spec","category":"user-experience","collection":"","title_en":"Declarative Button Actions","title_zh":"声明式按钮操作","desc_en":"The Invoker Commands API allows buttons to trigger actions on target elements declaratively using HTML attributes.","desc_zh":"Invoker Commands API 让按钮能够通过 HTML 属性以声明式的方式在目标元素上触发操作。"},{"slug":"packs/design-pack/guides/user-experience/declarative-dialog-popover-control","type":"spec","category":"user-experience","collection":"","title_en":"Overview","title_zh":"概述","desc_en":"Use the Invoker Commands API to toggle the visibility of <dialog> and [popover] elements directly from HTML buttons, eliminating the need for custom JavaScript event listeners.","desc_zh":"使用 Invoker Commands API 直接通过 HTML 按钮切换 <dialog> 和 [popover] 元素的可见性，无需编写自定义的 JavaScript 事件监听器。"},{"slug":"packs/design-pack/guides/user-experience/deliver-optimized-decorative-images","type":"spec","category":"user-experience","collection":"","title_en":"deliver optimized decorative images","title_zh":"交付经过优化的装饰性图片","desc_en":"Delivering optimized decorative images via CSS improves perceived performance without sacrificing visual quality.","desc_zh":"通过 CSS 交付经过优化的装饰性图片，能在不牺牲视觉质量的前提下提升感知性能。"},{"slug":"packs/design-pack/guides/user-experience/design-token-reactivity","type":"spec","category":"user-experience","collection":"","title_en":"design token reactivity","title_zh":"设计令牌的响应式","desc_en":"Often an author will need to make contextual changes to the design of a component.","desc_zh":"开发者常常需要根据上下文对组件的设计进行调整。"},{"slug":"packs/design-pack/guides/user-experience/directional-navigation-transitions","type":"spec","category":"user-experience","collection":"","title_en":"directional navigation transitions","title_zh":"方向性导航过渡","desc_en":"Single Page Applications (SPAs) provide the appearance of navigation by replacing the content of the page without navigating to a new page.","desc_zh":"单页应用（SPA）通过替换页面内容而非跳转到新页面，营造出导航的视觉效果。"},{"slug":"packs/design-pack/guides/user-experience/dynamic-sibling-animations","type":"spec","category":"user-experience","collection":"","title_en":"Creating a stagger animation","title_zh":"创建交错动画","desc_en":"Stagger animations provide an interesting effect where multiple ordered elements animate sequentially with a slight delay between each, rather than all animating at once.","desc_zh":"交错动画能营造出一种有趣的效果：多个有序元素依次播放动画，每个元素之间略有延迟，而非一次性同时播放。"},{"slug":"packs/design-pack/guides/user-experience/dynamic-sibling-styling","type":"spec","category":"user-experience","collection":"","title_en":"Styling siblings based on count and index","title_zh":"根据数量和索引为同级元素设置样式","desc_en":"Historically, applying unique styles to each sibling in a list required complex :nth-child loops or JavaScript to inject inline styles.","desc_zh":"以往，为列表中的每个同级元素设置独特样式需要复杂的 :nth-child 循环或使用 JavaScript 注入内联样式。"},{"slug":"packs/design-pack/guides/user-experience/export-html-media-from-canvas","type":"spec","category":"user-experience","collection":"","title_en":"Export HTML content from canvas","title_zh":"从 canvas 导出 HTML 内容","desc_en":"Web applications frequently need to capture and export rich HTML content—such as customized dashboards, styled documents, or interactive charts—as static images or video…","desc_zh":"Web 应用常常需要将丰富的 HTML 内容（如自定义仪表板、带样式的文档或交互式图表）捕获并导出为静态图像或视频…"},{"slug":"packs/design-pack/guides/user-experience/expose-canvas-content-to-browser-features","type":"spec","category":"user-experience","collection":"","title_en":"Expose canvas content to browser features","title_zh":"将 canvas 内容暴露给浏览器功能","desc_en":"Regular <canvas> content is not exposed to browser features such as screen readers, indexing, translation tools, accessibility assistive tools, find-in-page, print, etc.","desc_zh":"常规的 <canvas> 内容不会暴露给屏幕阅读器、索引、翻译工具、accessibility 辅助工具、find-in-page、打印等浏览器功能。"},{"slug":"packs/design-pack/guides/user-experience/flicker-free-client-side-ab-testing","type":"spec","category":"user-experience","collection":"","title_en":"Flicker-Free Client-Side A/B Testing","title_zh":"无闪烁的客户端 A/B 测试","desc_en":"Client-side A/B testing tools work by loading a script that modifies the DOM after the browser has already begun constructing the page.","desc_zh":"客户端 A/B 测试工具的工作方式是加载一个脚本，在浏览器已经开始构建页面之后修改 DOM。"},{"slug":"packs/design-pack/guides/user-experience/fluid-scaling","type":"spec","category":"user-experience","collection":"","title_en":"fluid scaling","title_zh":"流式缩放","desc_en":"Fluid scaling allows components to adjust their internal proportions (like font sizes and spacing) based on their current dimensions.","desc_zh":"流式缩放让组件能够根据自身当前尺寸调整其内部比例（如字号和间距）。"},{"slug":"packs/design-pack/guides/user-experience/format-human-readable-durations","type":"spec","category":"user-experience","collection":"","title_en":"Formatting Human-Readable Durations with Temporal","title_zh":"使用 Temporal 格式化人类可读的时长","desc_en":"Presenting elapsed time or durations to users in a readable format (e.g., '1 hour and 30 minutes') has historically required manual math or external libraries.","desc_zh":"以可读格式（例如 '1 hour and 30 minutes'）向用户呈现已用时间或时长，过去通常需要手动计算或使用外部库。"},{"slug":"packs/design-pack/guides/user-experience/group-element-transitions","type":"spec","category":"user-experience","collection":"","title_en":"group element transitions","title_zh":"分组元素过渡","desc_en":"As items are added or removed from a list, or rearranged, transitions can help users maintain context.","desc_zh":"当列表中的项被添加、移除或重新排列时，过渡动画能帮助用户保持上下文。"},{"slug":"packs/design-pack/guides/user-experience/improve-text-layout-and-legibility","type":"spec","category":"user-experience","collection":"","title_en":"Improve Text Layout and Legibility","title_zh":"改善文本排版与易读性","desc_en":"The layout of text, particularly at the ends of lines and and ends of paragraphs, can impact the legibility and aesthetic appeal of a page.","desc_zh":"文本的排版，尤其是在行尾和段落末尾处，会影响页面的易读性和美观度。"},{"slug":"packs/design-pack/guides/user-experience/individual-transform-properties","type":"spec","category":"user-experience","collection":"","title_en":"individual transform properties","title_zh":"独立的 transform 属性","desc_en":"The transform property allows you to apply multiple transformations in a specified order, but any changes to a single transformation require re-specifying the entire…","desc_zh":"transform 属性允许你按指定顺序应用多个变换，但对单个变换的任何改动都需要重新指定整个…"},{"slug":"packs/design-pack/guides/user-experience/interactive-content-in-3d-scenes","type":"spec","category":"user-experience","collection":"","title_en":"Enable interactive HTML content in 3D scenes","title_zh":"在 3D 场景中启用可交互的 HTML 内容","desc_en":"The HTML-in-Canvas API allows rendering real DOM directly inside a canvas element.","desc_zh":"HTML-in-Canvas API 允许直接在 canvas 元素内渲染真实的 DOM。"},{"slug":"packs/design-pack/guides/user-experience/interactive-content-reveal","type":"spec","category":"user-experience","collection":"","title_en":"interactive content reveal","title_zh":"交互式内容显现效果","desc_en":"Add performant, interactive reveal effects to your site with CSS masks and registered custom properties.","desc_zh":"使用 CSS masks 和已注册的 custom properties，为你的网站添加高性能的交互式显现效果。"},{"slug":"packs/design-pack/guides/user-experience/interest-triggered-action-previews","type":"spec","category":"user-experience","collection":"","title_en":"interest triggered action previews","title_zh":"由 interest 触发的操作预览","desc_en":"It can be beneficial to provide users a preview of their actions before they commit to them.","desc_zh":"在用户确认操作之前，为其提供操作预览往往很有帮助。"},{"slug":"packs/design-pack/guides/user-experience/interest-triggered-tooltips","type":"spec","category":"user-experience","collection":"","title_en":"Show a tooltip when hovering","title_zh":"悬停时显示工具提示","desc_en":"Users expect to see additional related information without completely changing their context.","desc_zh":"用户希望在不完全切换上下文的情况下看到额外的相关信息。"},{"slug":"packs/design-pack/guides/user-experience/light-dismiss-a-dialog","type":"spec","category":"user-experience","collection":"","title_en":"light dismiss a dialog","title_zh":"轻触关闭对话框（light dismiss）","desc_en":"Modern modal dialogs often support 'light-dismiss,' allowing users to close a dialog by clicking or tapping the backdrop (the area outside the dialog).","desc_zh":"现代模态对话框通常支持“轻触关闭（light-dismiss）”，允许用户通过点击或轻触背景遮罩（对话框之外的区域）来关闭对话框。"},{"slug":"packs/design-pack/guides/user-experience/manage-recurring-intervals","type":"spec","category":"user-experience","collection":"","title_en":"Managing Recurring Intervals with Temporal","title_zh":"使用 Temporal 管理周期性间隔","desc_en":"Calculating recurring intervals, such as subscription billing cycles or payroll periods, has historically been error-prone with the legacy Date object.","desc_zh":"计算周期性间隔（例如订阅计费周期或薪资发放周期）一直是个易出错的难题，传统的 Date 对象尤其如此。"},{"slug":"packs/design-pack/guides/user-experience/model-partial-time-concepts","type":"spec","category":"user-experience","collection":"","title_en":"Modeling Partial Time Concepts with Temporal","title_zh":"使用 Temporal 建模不完整的时间概念","desc_en":"Modeling date concepts that lack a full calendar date—such as credit card expirations, annual renewals, or daily alarms—has historically been error-prone with the legacy Date…","desc_zh":"对缺少完整日历日期的日期概念建模（例如信用卡有效期、年度续订或每日闹钟）一直是个易出错的难题，传统的 Date 对象尤其如此……"},{"slug":"packs/design-pack/guides/user-experience/move-dom-element-without-losing-state","type":"spec","category":"user-experience","collection":"","title_en":"move dom element without losing state","title_zh":"移动 DOM 元素而不丢失状态","desc_en":"When reparenting DOM elements using traditional methods like appendChild() or insertBefore(), the browser implicitly removes the element from the DOM and then inserts it into its…","desc_zh":"使用 appendChild() 或 insertBefore() 等传统方法重新指定 DOM 元素的父节点时，浏览器会隐式地将元素从 DOM 中移除，然后再插入到其新位置……"},{"slug":"packs/design-pack/guides/user-experience/navigation-drawer","type":"spec","category":"user-experience","collection":"","title_en":"navigation drawer","title_zh":"导航抽屉","desc_en":"A navigation drawer is a panel that slides in from the edge of the viewport over the page content, dimming everything behind it.","desc_zh":"导航抽屉是一个从视口边缘滑入、覆盖在页面内容之上的面板，并使其后方的所有内容变暗。"},{"slug":"packs/design-pack/guides/user-experience/overflow-clipping-control","type":"spec","category":"user-experience","collection":"","title_en":"Overflow Clipping Control","title_zh":"溢出裁剪控制","desc_en":"While overflow: hidden is a 'blunt instrument' that almost always clips content strictly at the padding-box, overflow: clip combined with overflow-clip-margin provides the…","desc_zh":"overflow: hidden 是一把'钝器'，几乎总是严格在 padding-box 处裁剪内容，而 overflow: clip 结合 overflow-clip-margin 则提供了……"},{"slug":"packs/design-pack/guides/user-experience/parallax-scroll-effects","type":"spec","category":"user-experience","collection":"","title_en":"Build a Parallax Effect on Scroll","title_zh":"构建滚动视差效果","desc_en":"A parallax effect on scroll is a visual technique where different layers of content move at varying speeds as the user scrolls down a page.","desc_zh":"滚动视差效果是一种视觉技术，当用户向下滚动页面时，不同层级的内容以不同速度移动。"},{"slug":"packs/design-pack/guides/user-experience/persistent-app-tours","type":"spec","category":"user-experience","collection":"","title_en":"Creating Persistent App Tours","title_zh":"创建持久化应用引导","desc_en":"Onboarding tours require overlays that persist while users interact with the highlighted features.","desc_zh":"新手引导需要在用户与高亮功能交互时保持可见的覆盖层。"},{"slug":"packs/design-pack/guides/user-experience/persistent-toast-notifications","type":"spec","category":"user-experience","collection":"","title_en":"Creating Toast Notifications","title_zh":"创建 Toast 通知","desc_en":"Toast notifications are transient status messages.","desc_zh":"Toast 通知是短暂的状态消息。"},{"slug":"packs/design-pack/guides/user-experience/persistent-top-layer-ui","type":"spec","category":"user-experience","collection":"","title_en":"persistent top layer ui","title_zh":"持久化顶层 UI","desc_en":"When moving an open <dialog>, popover, or fullscreen element in the DOM using traditional methods like appendChild() or insertBefore(), the browser implicitly removes the element…","desc_zh":"在 DOM 中使用 appendChild() 或 insertBefore() 等传统方法移动已打开的 <dialog>、popover 或全屏元素时，浏览器会隐式地移除该元素……"},{"slug":"packs/design-pack/guides/user-experience/physics-based-easing","type":"spec","category":"user-experience","collection":"","title_en":"physics based easing","title_zh":"基于物理的缓动效果","desc_en":"Traditional CSS easing functions like ease-in or cubic-bezier() are limited to simple curves, making it impossible to create complex physics-based effects like bounces or springs.","desc_zh":"传统的 CSS 缓动函数（如 ease-in 或 cubic-bezier()）仅限于简单曲线，无法创建弹跳或弹簧等复杂的物理效果。"},{"slug":"packs/design-pack/guides/user-experience/platform-controls-dismiss-dialog","type":"spec","category":"user-experience","collection":"","title_en":"platform controls dismiss dialog","title_zh":"通过平台控件关闭对话框","desc_en":"When a modal dialog is open, users expect to use familiar controls to dismiss them: pressing the <kbd>Esc</kbd> key on a keyboard, using the back button or gesture on mobile…","desc_zh":"当模态对话框打开时，用户期望使用熟悉的控件关闭它：在键盘上按 <kbd>Esc</kbd> 键、在移动端使用返回按钮或手势……"},{"slug":"packs/design-pack/guides/user-experience/position-aware-tooltips","type":"spec","category":"user-experience","collection":"","title_en":"position aware tooltips","title_zh":"位置感知的 tooltip","desc_en":"When building tooltips or popovers with CSS Anchor Positioning, the browser can automatically 'flip' the element to a fallback position if it would otherwise overflow the viewport.","desc_zh":"使用 CSS anchor positioning 构建 tooltip 或 popover 时，如果元素会溢出视口，浏览器可以自动将其'翻转'到备用位置。"},{"slug":"packs/design-pack/guides/user-experience/precise-text-alignment","type":"spec","category":"user-experience","collection":"","title_en":"Precise Text Alignment","title_zh":"精确的文本对齐","desc_en":"Browsers automatically add extra whitespace above and below text characters to accommodate line-height and font-specific metrics like ascenders and descenders.","desc_zh":"浏览器会在文本字符的上下自动添加额外的空白，以容纳 line-height 以及字体特有的度量值（如上伸部和下伸部）。"},{"slug":"packs/design-pack/guides/user-experience/prevent-text-wrapping","type":"spec","category":"user-experience","collection":"","title_en":"Prevent text wrapping","title_zh":"防止文本换行","desc_en":"Modern CSS provides the text-wrap property to control how text breaks within its container.","desc_zh":"现代 CSS 提供了 text-wrap 属性来控制文本在其容器内的换行方式。"},{"slug":"packs/design-pack/guides/user-experience/pull-to-reveal","type":"spec","category":"user-experience","collection":"","title_en":"Pull to Reveal","title_zh":"下拉显示","desc_en":"'Pull to reveal' is a UI pattern where content (such as a search bar or refresh control) is hidden above the top of a scrollable area on initial load, and the user can pull down…","desc_zh":"'下拉显示'是一种 UI 模式，初次加载时内容（如搜索栏或刷新控件）隐藏在可滚动区域顶部上方，用户可以下拉……"},{"slug":"packs/design-pack/guides/user-experience/reduce-style-repetition","type":"spec","category":"user-experience","collection":"","title_en":"Reduce Style Repetition with CSS Functions","title_zh":"使用 CSS Functions 减少样式重复","desc_en":"Maintaining large stylesheets often leads to repetitive logic, especially when dealing with design system tokens like gradients or responsive layout patterns.","desc_zh":"维护大型样式表往往会产生重复的逻辑，在处理渐变或响应式布局模式等设计系统令牌时尤为明显。"},{"slug":"packs/design-pack/guides/user-experience/resilient-context-menus-and-nested-dropdowns","type":"spec","category":"user-experience","collection":"","title_en":"resilient context menus and nested dropdowns","title_zh":"弹性上下文菜单与嵌套下拉菜单","desc_en":"A revealed action panel or popover button group is a useful pattern for users to access additional functionality while taking up minimal space.","desc_zh":"展开式操作面板或 popover 按钮组是一种实用的模式，让用户能在占用最少空间的同时访问额外功能。"},{"slug":"packs/design-pack/guides/user-experience/same-document-transitions","type":"spec","category":"user-experience","collection":"","title_en":"Same Document Transitions","title_zh":"同文档过渡","desc_en":"Web sites often provide multiple views of an object, for instance a list of products, and then a detail page for each product.","desc_zh":"网站通常会为某个对象提供多个视图，例如商品列表，以及每件商品的详情页。"},{"slug":"packs/design-pack/guides/user-experience/scroll-entry-exit-effects","type":"spec","category":"user-experience","collection":"","title_en":"Add entry and exit effects to elements as they enter or exit the scrollport","title_zh":"在元素进入或离开 scrollport 时为其添加进入和退出效果","desc_en":"Entry and exit effects are animations that are triggered when an element enters or leaves the viewport.","desc_zh":"进入和退出效果是当元素进入或离开视口时触发的动画。"},{"slug":"packs/design-pack/guides/user-experience/scroll-position-aware-elements","type":"spec","category":"user-experience","collection":"","title_en":"scroll position aware elements","title_zh":"感知滚动位置的元素","desc_en":"Improve the user experience of floating buttons, like a 'Back to Top' link, by showing them only when they are useful.","desc_zh":"仅在浮动按钮（如“返回顶部”链接）真正有用时才显示它们，从而改善用户体验。"},{"slug":"packs/design-pack/guides/user-experience/scroll-progress-indicator","type":"spec","category":"user-experience","collection":"","title_en":"Build a Scroll Progress Indicator","title_zh":"构建滚动进度指示器","desc_en":"A scroll progress indicator is a common user interface pattern that visually communicates the user's progress through a scrollable document or container.","desc_zh":"滚动进度指示器是一种常见的用户界面模式，用于直观地展示用户在可滚动文档或容器中的浏览进度。"},{"slug":"packs/design-pack/guides/user-experience/scroll-snap-realtime-feedback","type":"spec","category":"user-experience","collection":"","title_en":"scroll snap realtime feedback","title_zh":"滚动捕捉的实时反馈","desc_en":"Users expect immediate visual feedback when interacting with UI elements like carousels or galleries.","desc_zh":"用户在与轮播或画廊等 UI 元素交互时，期望获得即时的视觉反馈。"},{"slug":"packs/design-pack/guides/user-experience/scroll-snap-state-sync","type":"spec","category":"user-experience","collection":"","title_en":"scroll snap state sync","title_zh":"滚动捕捉状态同步","desc_en":"Synchronizing UI state with a scrollable container's snap position traditionally required complex scroll event listeners, manual calculations of scroll offsets, and intersection…","desc_zh":"将 UI 状态与可滚动容器的捕捉位置同步，传统上需要复杂的 scroll 事件监听器、手动计算滚动偏移量以及 intersection observer……"},{"slug":"packs/design-pack/guides/user-experience/scroll-target-on-load","type":"spec","category":"user-experience","collection":"","title_en":"Set a scroll target for the initial render","title_zh":"为初始渲染设置滚动目标","desc_en":"The CSS property scroll-initial-target offers a declarative, CSS-only way to bring a specific descendant element into the visible area of its scroll container as soon as that…","desc_zh":"CSS 属性 scroll-initial-target 提供了一种声明式的纯 CSS 方法，可在滚动容器渲染时立即将其某个特定后代元素带入可见区域……"},{"slug":"packs/design-pack/guides/user-experience/scrollability-affordance-hints","type":"spec","category":"user-experience","collection":"","title_en":"scrollability affordance hints","title_zh":"可滚动性提示线索","desc_en":"Visual hints, like shadows or gradients, help users understand that they can scroll to see more content.","desc_zh":"阴影或渐变等视觉线索，可帮助用户理解他们能够通过滚动查看更多内容。"},{"slug":"packs/design-pack/guides/user-experience/scrollytelling","type":"spec","category":"user-experience","collection":"","title_en":"Scrollytelling","title_zh":"Scrollytelling 滚动叙事","desc_en":"Scrollytelling is a popular technique used to create engaging and immersive web experiences.","desc_zh":"Scrollytelling 是一种广受欢迎的技术，用于打造引人入胜且沉浸式的网页体验。"},{"slug":"packs/design-pack/guides/user-experience/search-hidden-content","type":"spec","category":"user-experience","collection":"","title_en":"Search hidden content","title_zh":"搜索隐藏内容","desc_en":"Web interfaces often hide content from view to improve the user experience, save screen space, or increase page performance.","desc_zh":"Web 界面常常将内容隐藏起来，以改善用户体验、节省屏幕空间或提升页面性能。"},{"slug":"packs/design-pack/guides/user-experience/shaped-cutouts","type":"spec","category":"user-experience","collection":"","title_en":"shaped cutouts","title_zh":"异形镂空","desc_en":"CSS Masking allows you to clip an element to a custom shape, such as adding a notch to a card or creating a shaped border.","desc_zh":"CSS Masking 允许你将元素裁剪为自定义形状，例如为卡片添加缺口或创建异形边框。"},{"slug":"packs/design-pack/guides/user-experience/shrinking-header-on-scroll","type":"spec","category":"user-experience","collection":"","title_en":"Shrinking headder on scroll","title_zh":"滚动时收缩的页头","desc_en":"A shrinking header on scroll is a common UI pattern where a fixed header element at the top of the page smoothly transitions to a smaller size as the user scrolls down.","desc_zh":"滚动收缩页头是一种常见的 UI 模式：页面顶部的固定页头元素会随着用户向下滚动而平滑过渡为更小的尺寸。"},{"slug":"packs/design-pack/guides/user-experience/size-aware-styling","type":"spec","category":"user-experience","collection":"","title_en":"size aware styling","title_zh":"尺寸感知样式","desc_en":"Size-aware styling allows components to change their layout or appearance based on the space available to them, rather than the size of the whole screen.","desc_zh":"尺寸感知样式让组件能够根据自身可用空间（而非整个屏幕的尺寸）来改变布局或外观。"},{"slug":"packs/design-pack/guides/user-experience/soft-edge-content-fade","type":"spec","category":"user-experience","collection":"","title_en":"soft edge content fade","title_zh":"柔和边缘内容渐隐","desc_en":"To apply a transparency gradient to the edges of a container (e.g., to indicate more content is available to scroll or to fade out text), use CSS Masking with a linear gradient.","desc_zh":"要为容器边缘应用透明度渐变（例如提示还有更多可滚动内容或让文本淡出），可使用配合线性渐变的 CSS Masking。"},{"slug":"packs/design-pack/guides/user-experience/stabilize-reactive-state","type":"spec","category":"user-experience","collection":"","title_en":"Stabilize Reactive State with Temporal","title_zh":"使用 Temporal 稳定响应式状态","desc_en":"While some reactive systems (like React) rely strictly on reference equality to detect state changes, others (like Vue and Svelte) can track mutations to plain objects.","desc_zh":"有些响应式系统（如 React）严格依赖引用相等来检测状态变化，而另一些（如 Vue 和 Svelte）则能追踪对普通对象的修改。"},{"slug":"packs/design-pack/guides/user-experience/stack-drill-down","type":"spec","category":"user-experience","collection":"","title_en":"Stack Drill Down","title_zh":"堆栈式逐层下钻","desc_en":"A stack drill-down is a hierarchical navigation pattern, common in mobile apps, where activating a link pushes a new full-screen view on top of the previous one.","desc_zh":"堆栈式下钻是一种常见于移动应用的层级导航模式：激活链接时会在前一视图之上推入一个新的全屏视图。"},{"slug":"packs/design-pack/guides/user-experience/style-parent-with-has","type":"spec","category":"user-experience","collection":"","title_en":"Style Parent with :has()","title_zh":"使用 :has() 设置父元素样式","desc_en":"Often, an error state requires styling elements outside the input itself—for example, changing the color of a parent fieldset border, highlighting the <label>, or showing a…","desc_zh":"错误状态常常需要为输入框之外的元素设置样式，例如更改父级 fieldset 边框的颜色、高亮 <label>，或在卡片标题中显示一个…"},{"slug":"packs/design-pack/guides/user-experience/support-global-calendar-systems","type":"spec","category":"user-experience","collection":"","title_en":"Supporting Global Calendar Systems with Temporal","title_zh":"使用 Temporal 支持全球日历系统","desc_en":"The traditional JavaScript Date object is based on a proleptic Gregorian calendar, making it challenging to build applications for users who rely on other calendar systems, such…","desc_zh":"传统的 JavaScript Date 对象基于外推格里高利历，这使得为依赖其他日历系统的用户构建应用变得困难，例如…"},{"slug":"packs/design-pack/guides/user-experience/swipe-to-remove","type":"spec","category":"user-experience","collection":"","title_en":"Swipe to remove","title_zh":"滑动删除","desc_en":"Swipe-to-remove patterns are common in mobile applications but can be challenging to implement cleanly on the web.","desc_zh":"滑动删除模式在移动应用中很常见，但在 Web 上要实现得干净利落却颇具挑战。"},{"slug":"packs/design-pack/guides/user-experience/visually-stable-font-fallbacks","type":"spec","category":"user-experience","collection":"","title_en":"visually stable font fallbacks","title_zh":"视觉稳定的字体回退","desc_en":"When web fonts load, they often replace a fallback font that has different dimensions, even if both are set to the same font-size.","desc_zh":"Web 字体加载时，往往会替换掉尺寸不同的回退字体，即便两者设置了相同的 font-size。"},{"slug":"packs/design-pack/guides/user-experience/visually-stable-mixed-fonts","type":"spec","category":"user-experience","collection":"","title_en":"visually stable mixed fonts","title_zh":"视觉稳定的混合字体","desc_en":"When mixing different font families, for instance when inserting inline code snippets, or switching out font families for different themes, differences in 'x-height' (the height…","desc_zh":"在混用不同字体族时，例如插入内联代码片段，或为不同主题切换字体族，'x-height'（小写字母的高度…）的差异可能…"},{"slug":"packs/design-pack/guides/user-experience/visually-texture-content","type":"spec","category":"user-experience","collection":"","title_en":"visually texture content","title_zh":"为内容添加视觉纹理","desc_en":"To apply realistic weathering or texture patterns (like grunge, noise, or paper texture) to an element, use CSS Masking (mask-image) with a repeating texture image.","desc_zh":"要为元素添加逼真的做旧或纹理图案（如做旧、噪点或纸张纹理），可使用 CSS Masking（mask-image）配合可重复的纹理图像。"},{"slug":"packs/design-pack/guides/webmcp/agentic-forms","type":"spec","category":"webmcp","collection":"","title_en":"agentic forms","title_zh":"智能体表单","desc_en":"The Declarative API transforms standard HTML <form> elements into WebMCP tools via attributes.","desc_zh":"声明式 API 通过属性将标准 HTML <form> 元素转换为 WebMCP 工具。"},{"slug":"packs/design-pack/guides/webmcp/agentic-javascript-tools","type":"spec","category":"webmcp","collection":"","title_en":"agentic javascript tools","title_zh":"智能体 JavaScript 工具","desc_en":"The Imperative API uses document.modelContext.registerTool() to programmatically define JavaScript tools.","desc_zh":"命令式 API 使用 document.modelContext.registerTool() 以编程方式定义 JavaScript 工具。"},{"slug":"packs/design-pack/guides/webmcp/webmcp","type":"spec","category":"webmcp","collection":"","title_en":"WebMCP (Web Model Context Protocol)","title_zh":"WebMCP（Web Model Context Protocol）","desc_en":"WebMCP is a browser-native JavaScript API that allows web pages to expose their client-side functionality as structured 'tools' to AI agents, browser assistants, and assistive…","desc_zh":"WebMCP 是一个浏览器原生的 JavaScript API，允许网页将其客户端功能以结构化的'工具'形式暴露给 AI 智能体、浏览器助手和辅助…"},{"slug":"packs/design-pack/requirements/accessibility-baseline","type":"requirement","category":"","collection":"","title_en":"Accessibility Baseline","title_zh":"无障碍基线","desc_en":"The default WCAG 2.2 AA accessibility floor every interface must meet.","desc_zh":"任何界面默认必须满足的 WCAG 2.2 AA 无障碍底线。"},{"slug":"packs/design-pack/requirements/responsive-baseline","type":"requirement","category":"","collection":"","title_en":"Responsive Baseline","title_zh":"响应式基线","desc_en":"Mobile-first, fluid, cross-breakpoint responsive baseline.","desc_zh":"移动优先、流式排版、跨断点可用的响应式底线。"},{"slug":"packs/design-pack/specs/color-system","type":"spec","category":"","collection":"","title_en":"Color System","title_zh":"配色系统","desc_en":"Semantic color tokens, light/dark themes, and contrast rules.","desc_zh":"语义化色彩 token、明暗双主题与对比规则。"},{"slug":"packs/design-pack/specs/cs-paper-figure-method","type":"spec","category":"","collection":"","title_en":"CS Paper Framework Figure — Method","title_zh":"CS 论文框架图画法","desc_en":"How to design a faithful, reviewer-first CS paper framework figure: pick the figure type × layout grammar, keep variables on edges, separate semantics from visuals, and build it as editable HTML/SVG.","desc_zh":"如何设计一张忠实、reviewer 友好的 CS 论文框架图:选图类型 × 版式语法,变量走连线,语义与视觉分离,用可编辑 HTML/SVG 实现。"},{"slug":"packs/design-pack/specs/spacing-layout","type":"spec","category":"","collection":"","title_en":"Spacing & Layout","title_zh":"间距与布局","desc_en":"4/8pt spacing scale, radius, shadow, and a 12-column grid.","desc_zh":"4/8pt 间距梯度、圆角、阴影与栅格系统。"},{"slug":"packs/design-pack/specs/taste/brandkit","type":"spec","category":"","collection":"taste","title_en":"Brandkit Image Generation Skill","title_zh":"Brandkit 图像生成技能","desc_en":"Premium brand-kit image generation skill for creating high-end brand-guidelines boards, logo systems, identity decks, and visual-world presentations. Trained for minimalist, cinematic, editorial, dark-tech, luxury, cultural, security, gaming, developer-tool, and consumer-app brand systems. Optimized for intentional logo concepting, refined composition, sparse typography, strong symbolic meaning, premium mockups, art-directed imagery, and flexible grid layouts.","desc_zh":"高端品牌套件图像生成技能,用于创建顶级品牌规范板、logo 系统、品牌识别提案和视觉世界演示。针对极简、电影感、编辑风、暗黑科技、奢侈品、文化、安全、游戏、开发者工具和消费类应用品牌系统进行训练。专为有意图的 logo 概念设计、精炼的构图、克制的排版、强烈的符号意义、高端模型样机、艺术指导的图像和灵活的网格布局而优化。"},{"slug":"packs/design-pack/specs/taste/brutalist-skill","type":"spec","category":"","collection":"taste","title_en":"SKILL: Industrial Brutalism & Tactical Telemetry UI","title_zh":"SKILL：工业野兽派与战术遥测 UI","desc_en":"Raw mechanical interfaces fusing Swiss typographic print with military terminal aesthetics. Rigid grids, extreme type scale contrast, utilitarian color, analog degradation effects. For data-heavy dashboards, portfolios, or editorial sites that need to feel like declassified blueprints.","desc_zh":"将瑞士字体印刷与军用终端美学融合的原始机械界面。刚性网格、极端字号对比、实用主义配色、模拟降质效果。适用于需要呈现解密蓝图质感的数据密集型仪表盘、作品集或编辑类网站。"},{"slug":"packs/design-pack/specs/taste/gpt-tasteskill","type":"spec","category":"","collection":"taste","title_en":"Core Directive: Awwwards-Level Design Engineering","title_zh":"核心指令：Awwwards 级别的设计工程","desc_en":"Elite UX/UI & Advanced GSAP Motion Engineer. Enforces Python-driven true randomization for layout variance, strict AIDA page structure, wide editorial typography (bans 6-line wraps), gapless bento grids, strict GSAP ScrollTriggers (pinning, stacking, scrubbing), inline micro-images, and massive section spacing.","desc_zh":"顶尖 UX/UI 与高级 GSAP 动效工程师。强制使用 Python 驱动的真随机化实现布局多样性、严格的 AIDA 页面结构、宽幅编辑式排版（禁止 6 行折行）、无间隙 bento 网格、严格的 GSAP ScrollTriggers（pinning、stacking、scrubbing）、内联微缩图像以及超大区块间距。"},{"slug":"packs/design-pack/specs/taste/minimalist-skill","type":"spec","category":"","collection":"taste","title_en":"Protocol: Premium Utilitarian Minimalism UI Architect","title_zh":"协议：高端实用主义极简 UI 架构师","desc_en":"Clean editorial-style interfaces. Warm monochrome palette, typographic contrast, flat bento grids, muted pastels. No gradients, no heavy shadows.","desc_zh":"简洁的编辑风格界面。暖色单色调配色、字体对比、扁平 bento 网格、柔和的粉彩。不使用渐变，不使用厚重阴影。"},{"slug":"packs/design-pack/specs/taste/redesign-skill","type":"spec","category":"","collection":"taste","title_en":"Redesign Skill","title_zh":"重设计技能","desc_en":"Upgrades existing websites and apps to premium quality. Audits current design, identifies generic AI patterns, and applies high-end design standards without breaking functionality. Works with any CSS framework or vanilla CSS.","desc_zh":"将现有网站和应用升级至高端品质。审查当前设计、识别通用化的 AI 模式，并在不破坏功能的前提下应用高端设计标准。兼容任意 CSS 框架或原生 CSS。"},{"slug":"packs/design-pack/specs/taste/soft-skill","type":"spec","category":"","collection":"taste","title_en":"Agent Skill: Principal UI/UX Architect & Motion Choreographer (Awwwards-Tier)","title_zh":"Agent 技能：首席 UI/UX 架构师与动效编排师（Awwwards 级别）","desc_en":"Teaches the AI to design like a high-end agency. Defines the exact fonts, spacing, shadows, card structures, and animations that make a website feel expensive. Blocks all the common defaults that make AI designs look cheap or generic.","desc_zh":"教会 AI 像高端设计机构那样设计。精确定义让网站显得昂贵的字体、间距、阴影、卡片结构和动画。屏蔽所有让 AI 设计显得廉价或通用的常见默认做法。"},{"slug":"packs/design-pack/specs/taste/stitch-skill","type":"spec","category":"","collection":"taste","title_en":"Stitch Design Taste — Semantic Design System Skill","title_zh":"Stitch 设计品味 — 语义化设计系统技能","desc_en":"Semantic Design System Skill for Google Stitch. Generates agent-friendly DESIGN.md files that enforce premium, anti-generic UI standards — strict typography, calibrated color, asymmetric layouts, perpetual micro-motion, and hardware-accelerated performance.","desc_zh":"面向 Google Stitch 的语义化设计系统技能。生成对 agent 友好的 DESIGN.md 文件，强制执行高端、反通用化的 UI 标准——严格的排版、校准的色彩、非对称布局、持续的微动效以及硬件加速性能。"},{"slug":"packs/design-pack/specs/taste/taste-skill-v1","type":"spec","category":"","collection":"taste","title_en":"High-Agency Frontend Skill","title_zh":"高自主性前端技能","desc_en":"The original v1 taste-skill, preserved for projects depending on its exact behavior. The current default is `design-taste-frontend` (v2 experimental), which is a substantial rewrite. Use this v1 install name only if you need exact backward compatibility.","desc_zh":"最初的 v1 版 taste-skill，为依赖其确切行为的项目保留。当前默认版本是 `design-taste-frontend`（v2 实验版），属于大幅重写。仅在需要精确向后兼容时才使用此 v1 安装名称。"},{"slug":"packs/design-pack/specs/taste/taste-skill","type":"spec","category":"","collection":"taste","title_en":"tasteskill: Anti-Slop Frontend Skill","title_zh":"tasteskill：反平庸前端技能","desc_en":"Anti-slop frontend skill for landing pages, portfolios, and redesigns. The agent reads the brief, infers the right design direction, and ships interfaces that do not look templated. Real design systems when applicable, audit-first on redesigns, strict pre-flight check.","desc_zh":"面向落地页、作品集和重设计的反平庸前端技能。agent 阅读需求简报、推断正确的设计方向，并交付不显模板化的界面。适用时采用真实设计系统、重设计时审查优先、严格的预检流程。"},{"slug":"packs/design-pack/specs/typography-scale","type":"spec","category":"","collection":"","title_en":"Typography Scale","title_zh":"字体排印","desc_en":"Modular type scale, line-height, weight, and readability rules.","desc_zh":"模块化字阶、行高、字重与可读性规则。"},{"slug":"packs/design-pack/specs/workflow/image-to-code-skill","type":"spec","category":"","collection":"workflow","title_en":"Core Directive: Image-First Website Design To Code","title_zh":"核心指令：图像优先的网站设计转代码","desc_en":"Elite website image-to-code skill for Codex. For visually important web tasks, it must first generate the design image(s) itself, deeply analyze them, then implement the website to match them as closely as possible. In Codex, it must prefer large, readable, section-specific images instead of tiny compressed boards, generate fresh standalone images for sections or detail views instead of cropping old ones, avoid lazy under-generation, avoid cards-inside-cards-inside-cards UI, and keep the hero clean, spacious, readable, and visible on a small laptop.","desc_zh":"面向 Codex 的顶级网站 image-to-code 技能。对于视觉重要的网页任务，它必须先自行生成设计图像、深入分析，再尽可能贴近地实现网站。在 Codex 中，它应优先使用大尺寸、可读、针对具体区块的图像，而非微小压缩的拼板；为各区块或细节视图生成全新的独立图像，而非裁剪旧图；避免偷懒式生成不足；避免卡片套卡片套卡片的 UI；并保持 hero 区简洁、宽敞、可读，且在小型笔记本上可见。"},{"slug":"packs/design-pack/specs/workflow/imagegen-frontend-mobile","type":"spec","category":"","collection":"workflow","title_en":"Core Directive: Premium Mobile App Image Direction","title_zh":"核心指令：高端移动应用图像方向","desc_en":"Elite mobile app image-generation skill for creating premium, app-native screen concepts and flows. Designed for iOS, Android, and cross-platform mobile products. Prioritizes clean hierarchy, comfortably readable text, strong multi-screen consistency, controlled color palettes, non-generic creative direction, textured surfaces, image-led composition, tasteful custom iconography, and clean phone mockup framing. By default, screens should be shown inside a subtle premium iPhone or similar phone mockup with a visible frame, while the main focus stays on the app content itself. This skill generates images only. It does not write code.","desc_zh":"用于创作高端、应用原生的屏幕概念与流程的顶级移动应用图像生成技能。专为 iOS、Android 及跨平台移动产品设计。优先考虑清晰的层级、舒适可读的文字、强多屏一致性、克制的配色、非通用的创意方向、带纹理的表面、以图像为主导的构图、考究的自定义图标，以及简洁的手机外框呈现。默认情况下，屏幕应展示在精致高端的 iPhone 或类似手机外框中并带有可见边框，同时主要焦点仍保持在应用内容本身。此技能仅生成图像，不编写代码。"},{"slug":"packs/design-pack/specs/workflow/imagegen-frontend-web","type":"spec","category":"","collection":"workflow","title_en":"Hard Output Rule — Read First","title_zh":"硬性输出规则——请先阅读","desc_en":"Elite frontend image-direction skill for generating premium, conversion-aware website design references. CRITICAL OUTPUT RULE — generate ONE separate horizontal image FOR EVERY section. A landing page with 8 sections produces 8 images. Never compress multiple sections into one image. Enforces composition variety (not always left-text / right-image), background-image freedom, varied CTAs, varied hero scales (giant / mid / mini minimalist), narrative concept spine, second-read moments, and a single consistent palette across all images. Optimized for landing pages, marketing sites, and product comps that developers or coding models can accurately recreate.","desc_zh":"用于生成高端、注重转化的网站设计参考图的顶级前端图像艺术指导技能。关键输出规则——为每个 section 单独生成一张横向图像。含 8 个 section 的着陆页生成 8 张图像。绝不将多个 section 压缩进一张图像。强制构图多样性（不总是左文字 / 右图像）、自由使用背景图、多样的 CTA、多样的 hero 尺度（巨型 / 中型 / 极简迷你）、叙事概念主线、二次阅读亮点，以及所有图像统一一致的配色。针对着陆页、营销网站及产品样稿优化，便于开发者或编码模型精准复刻。"},{"slug":"packs/design-pack/specs/workflow/output-skill","type":"spec","category":"","collection":"workflow","title_en":"Full-Output Enforcement","title_zh":"完整输出强制规则","desc_en":"Overrides default LLM truncation behavior. Enforces complete code generation, bans placeholder patterns, and handles token-limit splits cleanly. Apply to any task requiring exhaustive, unabridged output.","desc_zh":"覆盖 LLM 默认的截断行为。强制生成完整代码，禁用占位符模式，并妥善处理 token 上限导致的分段。适用于任何需要详尽、完整无删减输出的任务。"},{"slug":"packs/design-pack/specs/xhs-visual-card-method","type":"spec","category":"","collection":"","title_en":"XHS Visual Card — Method","title_zh":"小红书图文设计法","desc_en":"Direct a 小红书 (RED) knowledge carousel as editable HTML cards: judge the brief on four axes, lock one visual master (a shared :root block), confirm the cover first, then stamp the remaining pages — plus a save-worthiness QA checklist. Ex
